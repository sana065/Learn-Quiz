<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: white; border-radius: 20px;
            padding: 40px; width: 100%; max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #2d3436; text-align: center; margin-bottom: 25px; }
        .player-row {
            display: flex; align-items: center;
            padding: 15px; border-radius: 12px;
            margin-bottom: 10px; background: #f8f9fa;
            transition: 0.2s;
        }
        .player-row:hover { background: #f0f0ff; }
        .rank {
            width: 35px; height: 35px; border-radius: 50%;
            background: #e0e0e0; display: flex;
            align-items: center; justify-content: center;
            font-weight: 700; margin-right: 15px; font-size: 14px;
        }
        .rank-1 { background: linear-gradient(135deg, #f9ca24, #f0932b); color: white; }
        .rank-2 { background: linear-gradient(135deg, #b2bec3, #636e72); color: white; }
        .rank-3 { background: linear-gradient(135deg, #e17055, #d63031); color: white; }
        .player-name { flex: 1; font-weight: 600; color: #2d3436; }
        .player-score { color: #667eea; font-weight: 700; }
        .back {
            display: block; text-align: center; margin-top: 20px;
            padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border-radius: 12px; text-decoration: none;
            font-weight: 600; transition: 0.3s;
        }
        .back:hover { transform: translateY(-2px); }
        .empty { text-align: center; color: #b2bec3; padding: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏆 Leaderboard</h1>

        {% if players %}
            {% for player in players %}
            <div class="player-row">
                <div class="rank {% if forloop.counter == 1 %}rank-1{% elif forloop.counter == 2 %}rank-2{% elif forloop.counter == 3 %}rank-3{% endif %}">
                    {{ forloop.counter }}
                </div>
                <div class="player-name">{{ player.name }}</div>
                <div class="player-score">{{ player.score }} pts</div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty">No players yet! Be the first 🚀</div>
        {% endif %}

        <a href="/" class="back">← Back to Home</a>
    </div>
</body>
</html>
