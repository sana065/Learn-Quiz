<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: white; border-radius: 20px;
            padding: 50px; width: 420px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .score-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .score-circle .percent { color: white; font-size: 40px; font-weight: 700; }
        .score-circle .label { color: rgba(255,255,255,0.8); font-size: 12px; }
        h2 { color: #2d3436; margin-bottom: 5px; }
        .name { color: #667eea; font-weight: 600; }
        .grade { font-size: 24px; margin: 15px 0; }
        .stats { 
            background: #f8f9fa; border-radius: 12px;
            padding: 15px; margin: 20px 0;
            display: flex; justify-content: space-around;
        }
        .stat { text-align: center; }
        .stat-num { font-size: 24px; font-weight: 700; color: #667eea; }
        .stat-label { font-size: 12px; color: #636e72; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        a {
            flex: 1; padding: 12px; border-radius: 12px;
            text-decoration: none; font-weight: 600;
            font-size: 14px; text-align: center; transition: 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-secondary { background: #f0f0ff; color: #667eea; }
        a:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Quiz Complete! 🎯</h2>
        <p>Well done, <span class="name">{{ player.name }}</span>!</p>

        <div class="score-circle">
            <span class="percent">{{ percentage }}%</span>
            <span class="label">Score</span>
        </div>

        <div class="grade">{{ grade }}</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-num">{{ score }}</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat">
                <div class="stat-num">{{ total|add:"-"|add:score }}</div>
                <div class="stat-label">Wrong</div>
            </div>
            <div class="stat">
                <div class="stat-num">{{ total }}</div>
                <div class="stat-label">Total</div>
            </div>
        </div>

        <div class="buttons">
            <a href="/" class="btn-primary">Play Again</a>
            <a href="/leaderboard/" class="btn-secondary">Leaderboard</a>
        </div>
    </div>
</body>
</html>
