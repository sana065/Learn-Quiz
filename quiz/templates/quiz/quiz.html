<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: white; border-radius: 20px;
            padding: 40px; width: 100%; max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .top-bar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }
        .question-count { color: #667eea; font-weight: 600; font-size: 14px; }
        .difficulty {
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
            background: #f0f0ff; color: #667eea;
        }
        .progress-bar {
            background: #f0f0f0; border-radius: 10px;
            height: 8px; margin-bottom: 30px;
        }
        .progress {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 8px; border-radius: 10px;
            transition: 0.5s;
        }
        h3 { color: #2d3436; font-size: 20px; margin-bottom: 25px; line-height: 1.5; }
        .option {
            display: block; padding: 15px 20px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            margin-bottom: 12px; cursor: pointer;
            transition: 0.2s; color: #2d3436;
        }
        .option:hover { border-color: #667eea; background: #f0f0ff; }
        input[type=radio] { display: none; }
        input[type=radio]:checked + .option {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea22, #764ba222);
            font-weight: 600;
        }
        button {
            width: 100%; padding: 15px; margin-top: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            font-family: 'Poppins', sans-serif; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="top-bar">
            <span class="question-count">Question {{ question_number }} of {{ total_questions }}</span>
            <span class="difficulty">{{ difficulty|title }}</span>
        </div>

        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <h3>{{ question.question_text }}</h3>

        <form method="POST">
            {% csrf_token %}
            {% for option in question.options %}
            <label>
                <input type="radio" name="answer" value="{{ option }}" required>
                <div class="option">{{ option }}</div>
            </label>
            {% endfor %}
            <button type="submit">Next Question →</button>
        </form>
    </div>
</body>
</html>
